<body class="bg-slate-950 text-slate-100 font-sans antialiased overflow-hidden h-[100dvh] w-screen select-none">

    <div id="root" class="h-full w-full"></div>

    <script type="text/babel">
        const { useState, useEffect, useLayoutEffect, useRef } = React;

        const formatDateKey = (date) => {
            const y = date.getFullYear();
            const m = String(date.getMonth() + 1).padStart(2, '0');
            const d = String(date.getDate()).padStart(2, '0');
            return `${y}-${m}-${d}`;
        };

        const formatDisplayDate = (date) => {
            const weekdays = ['日', '月', '火', '水', '木', '金', '土'];
            return `${date.getFullYear()}年 ${date.getMonth() + 1}月 ${date.getDate()}日（${weekdays[date.getDay()]}）`;
        };

        const isTodayDate = (date) => formatDateKey(date) === formatDateKey(new Date());

        const getInitialData = () => {
            const today = formatDateKey(new Date());
            return {
                [today]: [
                    {
                        id: 'welcome-1',
                        type: 'text',
                        content: '✨ Google Driveスマート同期日記へようこそ！\n\n複数のデバイスから書き込んでも、データが上書きされて消えることはありません。タブをアクティブにするか、手動更新を行うと瞬時に最新の状態へマージされます。',
                        timestamp: '12:00'
                    }
                ]
            };
        };

        const getStoredSession = () => {
            const token = localStorage.getItem('gdrive_access_token');
            const expiresAt = localStorage.getItem('gdrive_token_expires');
            if (token && expiresAt && Date.now() < parseInt(expiresAt, 10)) {
                return token;
            }
            return null;
        };

        const hasStoredDriveSession = () => Boolean(localStorage.getItem('gdrive_access_token'));
        const THEME_OPTIONS = [
            { id: 'dark', label: 'ダーク', icon: 'moon', color: '#6366f1' },
            { id: 'light', label: 'ライト', icon: 'sun', color: '#6366f1' },
        ];

        function App() {
            const [notes, setNotes] = useState(() => {
                const saved = localStorage.getItem('gdrive_diary_notes');
                return saved ? JSON.parse(saved) : getInitialData();
            });

            const [selectedDate, setSelectedDate] = useState(new Date());
            const [currentMonth, setCurrentMonth] = useState(new Date());
            const [inputText, setInputText] = useState('');
            const [pendingImage, setPendingImage] = useState(null);
            const [pendingImageUrl, setPendingImageUrl] = useState(null);
            const [isImageUploading, setIsImageUploading] = useState(false);
            const [imageUploadProgress, setImageUploadProgress] = useState(0);
            const [searchQuery, setSearchQuery] = useState('');
            const [contentFilter, setContentFilter] = useState('all');
            const [selectedSearchMessageId, setSelectedSearchMessageId] = useState(null);
            const [previewImage, setPreviewImage] = useState(null);
            const [isPreviewImageLoading, setIsPreviewImageLoading] = useState(false);
            const [dragActive, setDragActive] = useState(false);
            const [notification, setNotification] = useState(null);

            // スマホ用サイドバー開閉ステート
            const [isSidebarOpen, setIsSidebarOpen] = useState(false);

            const [activeTab, setActiveTab] = useState('timeline');

            const DEFAULT_CLIENT_ID = '758701255049-qg5hkjsna49m57ce8g8ht1av95v5f8tv.apps.googleusercontent.com';
            const [clientId, setClientId] = useState(() => localStorage.getItem('gdrive_client_id') || DEFAULT_CLIENT_ID);
            const [accessToken, setAccessToken] = useState(() => getStoredSession());
            const [hasDriveSession, setHasDriveSession] = useState(() => hasStoredDriveSession());
            const [syncStatus, setSyncStatus] = useState(() => getStoredSession() ? 'connected' : hasStoredDriveSession() ? 'connecting' : 'disconnected');
            const [isManualSyncing, setIsManualSyncing] = useState(false);
            const [syncLog, setSyncLog] = useState('');
            const [folderId, setFolderId] = useState(null);
            const [diaryFileId, setDiaryFileId] = useState(null);
            const [imageBlobCache, setImageBlobCache] = useState({});
            const [loadingImages, setLoadingImages] = useState({});
            const DEFAULT_OGP_WORKER_URL = 'https://private-sanctuary-ogp.vibrant-rep.workers.dev';
            const [ogpWorkerUrl, setOgpWorkerUrl] = useState(() => localStorage.getItem('ogp_worker_url') || DEFAULT_OGP_WORKER_URL);
            const [urlPreviewCache, setUrlPreviewCache] = useState({});
            const [isUrlSummarizing, setIsUrlSummarizing] = useState(false);
            const [editingMessage, setEditingMessage] = useState(null);
            const [editingText, setEditingText] = useState('');
            const [hasTimelineUpdates, setHasTimelineUpdates] = useState(false);
            const [themeId, setThemeId] = useState(() => {
                const saved = localStorage.getItem('diary_theme_id') || 'dark';
                return THEME_OPTIONS.some(theme => theme.id === saved) ? saved : 'dark';
            });

            const [currentOrigin, setCurrentOrigin] = useState('');

            const messagesEndRef = useRef(null);
            const timelineScrollRef = useRef(null);
            const messageRefs = useRef({});
            const fileInputRef = useRef(null);
            const tokenClientRef = useRef(null);
            const syncInFlightRef = useRef(false);
            const imageLoadPromisesRef = useRef({});
            const previewRequestIdRef = useRef(0);
            const shouldAutoScrollRef = useRef(true);
            const shouldNotifyTimelineUpdateRef = useRef(false);
            const preservedTimelineScrollTopRef = useRef(null);

            const selectDiaryDate = (date) => {
                const nextDate = new Date(date);
                shouldAutoScrollRef.current = true;
                setHasTimelineUpdates(false);
                setSelectedDate(nextDate);
                setCurrentMonth(new Date(nextDate.getFullYear(), nextDate.getMonth(), 1));
            };

            const shiftSelectedDate = (days) => {
                const nextDate = new Date(selectedDate);
                nextDate.setDate(nextDate.getDate() + days);
                selectDiaryDate(nextDate);
            };

            useEffect(() => {
                if (window.location.origin) {
                    setCurrentOrigin(window.location.origin);
                }
            }, []);

            useEffect(() => {
                localStorage.setItem('gdrive_diary_notes', JSON.stringify(notes));
            }, [notes]);

            useEffect(() => {
                localStorage.setItem('ogp_worker_url', ogpWorkerUrl.trim());
            }, [ogpWorkerUrl]);

            useEffect(() => {
                document.body.dataset.theme = themeId;
                localStorage.setItem('diary_theme_id', themeId);
            }, [themeId]);

            useEffect(() => {
                if (window.lucide) window.lucide.createIcons();
            });

            const isTimelineNearBottom = () => {
                const container = timelineScrollRef.current;
                if (!container) return true;
                return container.scrollHeight - container.scrollTop - container.clientHeight < 140;
            };

            const updateTimelineScrollIntent = () => {
                shouldAutoScrollRef.current = isTimelineNearBottom();
                if (shouldAutoScrollRef.current) {
                    setHasTimelineUpdates(false);
                }
            };

            const scrollTimelineToBottom = (behavior = 'smooth') => {
                shouldAutoScrollRef.current = true;
                setHasTimelineUpdates(false);
                window.requestAnimationFrame(() => {
                    messagesEndRef.current?.scrollIntoView({ behavior });
                });
            };

            const preserveTimelineScrollPosition = () => {
                const container = timelineScrollRef.current;
                preservedTimelineScrollTopRef.current = container ? container.scrollTop : null;
                shouldAutoScrollRef.current = false;
                shouldNotifyTimelineUpdateRef.current = false;
                setHasTimelineUpdates(false);
            };

            useLayoutEffect(() => {
                if (preservedTimelineScrollTopRef.current === null) return;
                const container = timelineScrollRef.current;
                if (container) {
                    const maxScrollTop = Math.max(0, container.scrollHeight - container.clientHeight);
                    container.scrollTop = Math.min(preservedTimelineScrollTopRef.current, maxScrollTop);
                }
                preservedTimelineScrollTopRef.current = null;
            }, [notes, selectedDate]);

            useEffect(() => {
                if (selectedSearchMessageId) return;
                if (shouldAutoScrollRef.current) {
                    scrollTimelineToBottom('smooth');
                } else if (shouldNotifyTimelineUpdateRef.current) {
                    setHasTimelineUpdates(true);
                }
                shouldNotifyTimelineUpdateRef.current = false;
            }, [notes, selectedDate]);

            useEffect(() => {
                if (selectedSearchMessageId || !shouldAutoScrollRef.current) return;
                scrollTimelineToBottom('smooth');
            }, [imageBlobCache]);

            useEffect(() => {
                if (!selectedSearchMessageId) return;
                const target = messageRefs.current[selectedSearchMessageId];
                if (!target) return;
                target.scrollIntoView({ behavior: 'smooth', block: 'center' });
                const timer = setTimeout(() => setSelectedSearchMessageId(null), 2200);
                return () => clearTimeout(timer);
            }, [selectedSearchMessageId, selectedDate, notes, contentFilter]);

            useEffect(() => {
                return () => {
                    if (pendingImageUrl) URL.revokeObjectURL(pendingImageUrl);
                };
            }, [pendingImageUrl]);

            const showNotification = (message, type = 'success') => {
                setNotification({ message, type });
                setTimeout(() => setNotification(null), 4000);
            };

            const closePreviewImage = () => {
                previewRequestIdRef.current += 1;
                setPreviewImage(null);
                setIsPreviewImageLoading(false);
            };

            const isDeletedNote = (note) => Boolean(note?.deletedAt);
            const getNoteVersion = (note) => Date.parse(note?.deletedAt || note?.updatedAt || note?.createdAt || note?.timestamp || '') || 0;
            const getVisibleNotes = (dayNotes = []) => dayNotes.filter(note => !isDeletedNote(note));
            const areNotesEqual = (a, b) => JSON.stringify(a || {}) === JSON.stringify(b || {});
            const URL_PATTERN = /https?:\/\/[^\s<>"']+/gi;
            const DIRECT_VIDEO_EXTENSIONS = new Set(['mp4', 'webm', 'ogg', 'ogv', 'mov', 'm4v']);
            const isImageFile = (file) => Boolean(file?.type?.startsWith('image/'));
            const isVideoFile = (file) => Boolean(file?.type?.startsWith('video/'));
            const isMediaFile = (file) => isImageFile(file) || isVideoFile(file);
            const isMediaMessage = (type) => type === 'image' || type === 'video';

            const cleanUrl = (url) => url.replace(/[),.、。]+$/g, '');
            const escapeRegExp = (value = '') => value.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
            const getActiveSearchTerm = () => searchQuery.trim();
            const extractUrls = (text = '') => {
                const seen = new Set();
                return (text.match(URL_PATTERN) || [])
                    .map(cleanUrl)
                    .filter(url => {
                        try {
                            const parsed = new URL(url);
                            if (!['http:', 'https:'].includes(parsed.protocol) || seen.has(parsed.href)) return false;
                            seen.add(parsed.href);
                            return true;
                        } catch {
                            return false;
                        }
                    });
            };

            const getUrlMeta = (url) => {
                try {
                    const parsed = new URL(url);
                    return {
                        href: parsed.href,
                        host: parsed.hostname.replace(/^www\./, ''),
                        path: `${parsed.pathname}${parsed.search}`.replace(/\/$/, '') || '/'
                    };
                } catch {
                    return { href: url, host: url, path: '' };
                }
            };

            const isTikTokUrl = (url) => {
                try {
                    const host = new URL(url).hostname.replace(/^www\./, '').toLowerCase();
                    return host === 'tiktok.com' || host === 'm.tiktok.com' || host === 'vm.tiktok.com' || host === 'vt.tiktok.com';
                } catch {
                    return false;
                }
            };

            const getDirectVideoInfo = (url) => {
                try {
                    const parsed = new URL(url);
                    const extension = parsed.pathname.split('.').pop()?.toLowerCase() || '';
                    if (!DIRECT_VIDEO_EXTENSIONS.has(extension)) return null;
                    return {
                        src: parsed.href,
                        type: extension === 'ogv' ? 'video/ogg' : extension === 'm4v' ? 'video/mp4' : `video/${extension}`
                    };
                } catch {
                    return null;
                }
            };

            const isVideoLinkUrl = (url) => {
                try {
                    const host = new URL(url).hostname.replace(/^www\./, '').toLowerCase();
                    return host === 'youtu.be' || host.endsWith('youtube.com') || isTikTokUrl(url) || Boolean(getDirectVideoInfo(url));
                } catch {
                    return false;
                }
            };

            const messageHasArticleLink = (message) => extractUrls(message?.content || '').some(url => !isVideoLinkUrl(url));
            const matchesContentFilter = (message, filter = contentFilter) => {
                if (filter === 'image') return message.type === 'image';
                if (filter === 'video') return message.type === 'video';
                if (filter === 'article') return messageHasArticleLink(message);
                return true;
            };
            const getFilteredNotes = (dayNotes = [], filter = contentFilter) => getVisibleNotes(dayNotes).filter(note => matchesContentFilter(note, filter));

            const getPreviewVideoInfo = (preview) => {
                if (!preview?.video) return null;
                const direct = getDirectVideoInfo(preview.video);
                if (direct) return direct;

                const type = (preview.videoType || '').toLowerCase();
                if (!type.startsWith('video/')) return null;
                return {
                    src: preview.video,
                    type
                };
            };

            const requestUrlPreview = async (url) => {
                const endpoint = ogpWorkerUrl.trim().replace(/\/$/, '');
                if (!endpoint) throw new Error('OGP Worker URLが未設定です');

                const response = await fetch(`${endpoint}?url=${encodeURIComponent(url)}&_=${Date.now()}`, {
                    headers: {
                        Accept: 'application/json',
                        'Cache-Control': 'no-cache',
                        'Pragma': 'no-cache'
                    },
                    cache: 'no-store'
                });
                const data = await response.json();
                if (!response.ok) throw new Error(data.error || 'URLプレビューの取得に失敗しました');
                return data;
            };

            const fetchUrlPreview = async (url) => {
                if (urlPreviewCache[url]?.status) return;
                setUrlPreviewCache(prev => ({ ...prev, [url]: { status: 'loading' } }));
                try {
                    const data = await requestUrlPreview(url);
                    setUrlPreviewCache(prev => ({ ...prev, [url]: { status: 'ready', data } }));
                } catch (err) {
                    setUrlPreviewCache(prev => ({ ...prev, [url]: { status: 'error', error: err.message } }));
                }
            };

            const appendUrlSummaries = async (text = '') => {
                const trimmed = text.trim();
                const urls = extractUrls(trimmed);
                if (!trimmed || urls.length === 0 || /AI要約[:：]/.test(trimmed)) return text;

                const summaries = [];
                for (const url of urls.slice(0, 3)) {
                    if (getDirectVideoInfo(url) || isTikTokUrl(url)) {
                        continue;
                    }

                    try {
                        let preview = urlPreviewCache[url]?.data;
                        if (!preview?.summary) {
                            preview = await requestUrlPreview(url);
                            setUrlPreviewCache(prev => ({ ...prev, [url]: { status: 'ready', data: preview } }));
                        }
                        if (getPreviewVideoInfo(preview) || preview?.player) {
                            continue;
                        }
                        if (preview?.summary) {
                            const host = getUrlMeta(url).host;
                            summaries.push(urls.length === 1 ? preview.summary : `【${host}】\n${preview.summary}`);
                        }
                    } catch (err) {
                        setUrlPreviewCache(prev => ({
                            ...prev,
                            [url]: prev[url]?.data
                                ? prev[url]
                                : { status: 'error', error: err.message }
                        }));
                    }
                }

                if (summaries.length === 0) return text;
                return `${trimmed}\n\nAI要約:\n${summaries.join('\n\n')}`;
            };

            const createImageThumbnail = (file, maxSize = 480, quality = 0.72) => {
                return new Promise((resolve, reject) => {
                    const image = new Image();
                    const objectUrl = URL.createObjectURL(file);

                    image.onload = () => {
                        try {
                            const scale = Math.min(1, maxSize / Math.max(image.width, image.height));
                            const width = Math.max(1, Math.round(image.width * scale));
                            const height = Math.max(1, Math.round(image.height * scale));
                            const canvas = document.createElement('canvas');
                            canvas.width = width;
                            canvas.height = height;
                            const ctx = canvas.getContext('2d');
                            ctx.fillStyle = '#0f172a';
                            ctx.fillRect(0, 0, width, height);
                            ctx.drawImage(image, 0, 0, width, height);
                            resolve(canvas.toDataURL('image/jpeg', quality));
                        } catch (err) {
                            reject(err);
                        } finally {
                            URL.revokeObjectURL(objectUrl);
                        }
                    };

                    image.onerror = () => {
                        URL.revokeObjectURL(objectUrl);
                        reject(new Error('サムネイル生成に失敗しました'));
                    };

                    image.src = objectUrl;
                });
            };

            const backfillThumbnailForImage = async (fileId, blob) => {
                const thumbnailDataUrl = await createImageThumbnail(blob);
                let changed = false;
                const updatedAt = new Date().toISOString();
                const updatedNotes = {};

                Object.keys(notes).forEach(dateKey => {
                    updatedNotes[dateKey] = notes[dateKey].map(note => {
                        if (note.gdriveFileId === fileId && !note.thumbnailDataUrl && !note.deletedAt) {
                            changed = true;
                            return {
                                ...note,
                                thumbnailDataUrl,
                                updatedAt
                            };
                        }
                        return note;
                    });
                });

                if (!changed) return;

                setNotes(updatedNotes);

                if (accessToken && folderId) {
                    setSyncLog('古い画像のサムネイルを生成し、同期データへ反映中...');
                    await pullAndMergeSync(accessToken, folderId, diaryFileId, updatedNotes);
                }
            };

            // ID重複を排除し、削除情報を優先してお互いの日記を自動マージするGitライクなコア関数
            const mergeNotes = (localNotes, cloudNotes) => {
                const merged = { ...localNotes };
                Object.keys(cloudNotes).forEach(dateKey => {
                    if (!merged[dateKey]) {
                        merged[dateKey] = cloudNotes[dateKey];
                    } else {
                        // 同一日のログマージ処理（ID基準で重複を完全ガード）
                        const localMap = new Map(merged[dateKey].map(n => [n.id, n]));
                        cloudNotes[dateKey].forEach(cloudNote => {
                            const localNote = localMap.get(cloudNote.id);
                            if (!localNote) {
                                localMap.set(cloudNote.id, cloudNote);
                                return;
                            }

                            if (isDeletedNote(localNote) || isDeletedNote(cloudNote)) {
                                localMap.set(cloudNote.id, getNoteVersion(cloudNote) > getNoteVersion(localNote) ? cloudNote : localNote);
                                return;
                            }

                            if (getNoteVersion(cloudNote) > getNoteVersion(localNote)) {
                                localMap.set(cloudNote.id, cloudNote);
                            }
                        });
                        // タイムスタンプ順に綺麗に並び替える
                        merged[dateKey] = Array.from(localMap.values()).sort((a, b) => 
                            (a.timestamp || '').localeCompare(b.timestamp || '')
                        );
                    }
                });
                return merged;
            };

            // タブに復帰（アプリ画面を開く、スマホのバックグラウンドから復帰等）した際、自動バックグラウンド同期
            useEffect(() => {
                const handleVisibilityAndFocus = () => {
                    if (document.visibilityState === 'visible' && accessToken && folderId) {
                        setSyncLog('画面の復帰を検知。バックグラウンドで最新データを同期マージ中...');
                        pullAndMergeSync(accessToken, folderId, diaryFileId);
                    }
                };

                window.addEventListener('focus', handleVisibilityAndFocus);
                document.addEventListener('visibilitychange', handleVisibilityAndFocus);

                return () => {
                    window.removeEventListener('focus', handleVisibilityAndFocus);
                    document.removeEventListener('visibilitychange', handleVisibilityAndFocus);
                };
            }, [accessToken, folderId, diaryFileId]);

            useEffect(() => {
                if (!accessToken || !folderId) return;

                const intervalId = window.setInterval(async () => {
                    if (document.visibilityState !== 'visible' || syncInFlightRef.current) return;

                    setSyncLog('定期バックグラウンド同期を実行中...');
                    await pullAndMergeSync(accessToken, folderId, diaryFileId);
                }, 45000);

                return () => window.clearInterval(intervalId);
            }, [accessToken, folderId, diaryFileId]);

            useEffect(() => {
                if (clientId && window.google) {
                    try {
                        tokenClientRef.current = google.accounts.oauth2.initTokenClient({
                            client_id: clientId,
                            scope: 'https://www.googleapis.com/auth/drive.file',
                            callback: async (resp) => {
                                if (resp.error) {
                                    setSyncStatus('error');
                                    setSyncLog(`Google Driveの再接続に失敗しました: ${resp.error}。日記はこの端末の保存データで閲覧できます。`);
                                    return;
                                }
                                
                                const bufferTime = 60 * 1000;
                                const expiresAt = Date.now() + (resp.expires_in * 1000) - bufferTime;
                                localStorage.setItem('gdrive_access_token', resp.access_token);
                                localStorage.setItem('gdrive_token_expires', expiresAt.toString());

                                setAccessToken(resp.access_token);
                                setHasDriveSession(true);
                                setSyncStatus('connected');
                                setActiveTab('timeline');
                                showNotification('Googleアカウントと接続しました', 'success');
                                setSyncLog('認証成功。Google Drive内の専用フォルダをスキャン中...');
                                await initializeDriveSync(resp.access_token);
                            },
                        });

                        const existingToken = getStoredSession();
                        if (existingToken) {
                            setHasDriveSession(true);
                            setSyncStatus('connected');
                            setActiveTab('timeline');
                            setSyncLog('有効なセッションを検出。同期を実行中...');
                            initializeDriveSync(existingToken);
                        } else {
                            const pastToken = localStorage.getItem('gdrive_access_token');
                            if (pastToken) {
                                setHasDriveSession(true);
                                setSyncStatus('connecting');
                                setActiveTab('timeline');
                                setSyncLog('Google Driveへ裏で再接続中です。日記はこの端末の保存データで閲覧できます。');
                                tokenClientRef.current.requestAccessToken({ prompt: '' });
                            }
                        }

                    } catch (err) {
                        console.error(err);
                        setSyncLog(`初期化エラー: ${err.message}`);
                    }
                }
            }, [clientId]);

            const handleSignOut = () => {
                if (accessToken) {
                    google.accounts.oauth2.revoke(accessToken, () => {
                        localStorage.removeItem('gdrive_access_token');
                        localStorage.removeItem('gdrive_token_expires');
                        setAccessToken(null);
                        setHasDriveSession(false);
                        setSyncStatus('disconnected');
                        setSyncLog('ログアウトしました。次回アクセス時は再度サインインが必要です。');
                        showNotification('ログアウトしました', 'info');
                        setActiveTab('timeline');
                    });
                }
            };

            const handleCopyOrigin = () => {
                const dummy = document.createElement('input');
                document.body.appendChild(dummy);
                dummy.value = currentOrigin;
                dummy.select();
                document.execCommand('copy');
                document.body.removeChild(dummy);
                showNotification('ドメインURLをコピーしました！');
            };

            const copyTextToClipboard = async (text) => {
                if (navigator.clipboard && window.isSecureContext) {
                    await navigator.clipboard.writeText(text);
                    return;
                }

                const dummy = document.createElement('textarea');
                dummy.value = text;
                dummy.setAttribute('readonly', '');
                dummy.style.position = 'fixed';
                dummy.style.opacity = '0';
                document.body.appendChild(dummy);
                dummy.select();
                document.execCommand('copy');
                document.body.removeChild(dummy);
            };

            const ensureDriveResponseOk = async (response, fallbackMessage) => {
                if (response.ok) return await response.json();

                let data = {};
                try {
                    data = await response.json();
                } catch {
                    data = {};
                }

                if (response.status === 401 || response.status === 403) {
                    throw new Error('Google Driveの認証が期限切れです。ヘッダのDriveボタンから再接続してください。');
                }

                throw new Error(data.error?.message || fallbackMessage);
            };

            const handleConnectDrive = () => {
                if (!clientId) {
                    showNotification('クライアントIDを入力してください', 'error');
                    return;
                }
                
                if (currentOrigin.startsWith('file://')) {
                    showNotification('ローカルファイルからは認証できません。', 'error');
                    setSyncLog('エラー: Googleの仕様上、ローカルファイル状態からはログイン認証できません。GitHub PagesやCloudflare PagesなどのHTTPSホストにアップロードした状態で、本設定を実行してください。');
                    return;
                }

                localStorage.setItem('gdrive_client_id', clientId);
                setSyncStatus('connecting');
                setSyncLog('Google Driveへの接続を開始しています...');
                
                if (tokenClientRef.current) {
                    tokenClientRef.current.requestAccessToken({ prompt: 'consent' });
                }
            };

            const initializeDriveSync = async (token) => {
                try {
                    setSyncStatus('syncing');
                    const folderName = 'MyPrivateSanctuary_Sync';
                    const q = `name='${folderName}' and mimeType='application/vnd.google-apps.folder' and trashed=false`;
                    
                    const response = await fetch(`https://www.googleapis.com/drive/v3/files?q=${encodeURIComponent(q)}&fields=files(id)`, {
                        headers: { Authorization: `Bearer ${token}` }
                    });
                    const resData = await ensureDriveResponseOk(response, '同期フォルダの確認に失敗しました');
                    
                    let activeFolderId = null;
                    if (resData.files && resData.files.length > 0) {
                        activeFolderId = resData.files[0].id;
                        setSyncLog('既存の同期フォルダを発見しました。');
                    } else {
                        setSyncLog('同期フォルダが存在しないため、新規作成中...');
                        const createResp = await fetch('https://www.googleapis.com/drive/v3/files', {
                            method: 'POST',
                            headers: {
                                Authorization: `Bearer ${token}`,
                                'Content-Type': 'application/json'
                            },
                            body: JSON.stringify({
                                name: folderName,
                                mimeType: 'application/vnd.google-apps.folder'
                            })
                        });
                        const newFolder = await ensureDriveResponseOk(createResp, '同期フォルダの作成に失敗しました');
                        activeFolderId = newFolder.id;
                        setSyncLog('同期フォルダを新規作成しました。');
                    }
                    setFolderId(activeFolderId);

                    await pullAndMergeSync(token, activeFolderId, null);

                } catch (err) {
                    setSyncStatus('error');
                    setSyncLog(`初期化処理失敗: ${err.message} 日記はこの端末の保存データで閲覧できます。`);
                }
            };

            // 最新のクラウドデータを一度引っ張り、ローカルデータと安全にマージさせてから相互保存するスマート同期
            const pullAndMergeSync = async (token = accessToken, fId = folderId, fFileId = diaryFileId, currentLocalNotes = null) => {
                if (!token || !fId) return;
                const isBackgroundSync = !currentLocalNotes;
                if (isBackgroundSync && syncInFlightRef.current) return;
                if (isBackgroundSync) syncInFlightRef.current = true;
                setSyncStatus('syncing');
                try {
                    const q = `name='diary_data.json' and '${fId}' in parents and trashed=false`;
                    const response = await fetch(`https://www.googleapis.com/drive/v3/files?q=${encodeURIComponent(q)}&fields=files(id)`, {
                        headers: { Authorization: `Bearer ${token}` }
                    });
                    const resData = await ensureDriveResponseOk(response, 'クラウドデータの検索に失敗しました');

                    let fileId = fFileId;
                    let cloudNotes = {};

                    if (resData.files && resData.files.length > 0) {
                        fileId = resData.files[0].id;
                        setDiaryFileId(fileId);

                        const downloadResp = await fetch(`https://www.googleapis.com/drive/v3/files/${fileId}?alt=media&_=${Date.now()}`, {
                            cache: 'no-store',
                            headers: {
                                Authorization: `Bearer ${token}`,
                                'Cache-Control': 'no-cache, no-store, must-revalidate',
                                'Pragma': 'no-cache'
                            }
                        });
                        if (!downloadResp.ok) throw new Error('クラウドデータの取得に失敗');
                        cloudNotes = await downloadResp.json();
                    }

                    // マージ処理を実行
                    const targetLocal = currentLocalNotes || notes;
                    const merged = mergeNotes(targetLocal, cloudNotes);

                    // マージされたデータをローカルステートおよびlocalStorageに保存
                    if (!areNotesEqual(targetLocal, merged)) {
                        shouldNotifyTimelineUpdateRef.current = isBackgroundSync && !shouldAutoScrollRef.current;
                        setNotes(merged);
                    }

                    // 最新マージ後のデータをクラウドへ書き戻す（お互い最新に保つ）
                    await uploadDiaryJson(token, fId, fileId, merged);

                    setSyncStatus('synced');
                    setSyncLog('スマート自動同期完了！お使いのすべてのデバイスと同期マージされました。');
                } catch (err) {
                    setSyncStatus('error');
                    setSyncLog(`同期同期マージに失敗しました: ${err.message}`);
                } finally {
                    if (isBackgroundSync) syncInFlightRef.current = false;
                }
            };

            const uploadDiaryJson = async (token, fId, fileId, notesData) => {
                try {
                    const metadata = {
                        name: 'diary_data.json',
                        mimeType: 'application/json'
                    };
                    if (!fileId) {
                        metadata.parents = [fId];
                    }

                    const boundary = '314159265358979323846';
                    const delimiter = `\r\n--${boundary}\r\n`;
                    const close_delim = `\r\n--${boundary}--`;

                    const multipartRequestBody =
                        delimiter +
                        'Content-Type: application/json; charset=UTF-8\r\n\r\n' +
                        JSON.stringify(metadata) +
                        delimiter +
                        'Content-Type: application/json\r\n\r\n' +
                        JSON.stringify(notesData) +
                        close_delim;

                    const url = fileId
                        ? `https://www.googleapis.com/upload/drive/v3/files/${fileId}?uploadType=multipart&fields=id`
                        : 'https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart&fields=id';

                    const response = await fetch(url, {
                        method: fileId ? 'PATCH' : 'POST',
                        headers: {
                            Authorization: `Bearer ${token}`,
                            'Content-Type': `multipart/related; boundary=${boundary}`
                        },
                        body: multipartRequestBody
                    });
                    const result = await response.json();
                    if (!response.ok) throw new Error(result.error?.message || 'クラウドデータの保存に失敗');
                    
                    if (result.id) {
                        setDiaryFileId(result.id);
                    }
                } catch (err) {
                    console.error("Upload failure:", err);
                    throw err;
                }
            };

            const handleForceSync = async () => {
                if (!accessToken || !folderId) {
                    showNotification('まずはGoogle Driveに接続してください', 'error');
                    return;
                }
                if (syncInFlightRef.current || isManualSyncing) {
                    showNotification('同期処理が進行中です', 'info');
                    return;
                }

                setIsManualSyncing(true);
                try {
                    setSyncLog('手動マージ同期を開始中...');
                    await pullAndMergeSync(accessToken, folderId, diaryFileId);
                    showNotification('手動マージ同期が完了しました');
                } finally {
                    setIsManualSyncing(false);
                }
            };

            const fetchImageFromDrive = async (fileId) => {
                if (imageBlobCache[fileId]) return imageBlobCache[fileId];
                if (!accessToken) throw new Error('Google Driveに接続してください');
                if (imageLoadPromisesRef.current[fileId]) return imageLoadPromisesRef.current[fileId];

                const loadPromise = (async () => {
                    setLoadingImages(prev => ({ ...prev, [fileId]: true }));
                    const response = await fetch(`https://www.googleapis.com/drive/v3/files/${fileId}?alt=media`, {
                        headers: {
                            Authorization: `Bearer ${accessToken}`,
                            'Cache-Control': 'no-cache',
                            'Pragma': 'no-cache'
                        },
                        cache: 'no-store'
                    });
                    if (!response.ok) throw new Error('ファイルの取得に失敗');
                    const blob = await response.blob();
                    const objectUrl = URL.createObjectURL(blob);
                     
                    setImageBlobCache(prev => ({ ...prev, [fileId]: objectUrl }));
                    if (blob.type.startsWith('image/')) {
                        backfillThumbnailForImage(fileId, blob).catch(err => console.error("Thumbnail backfill failed", err));
                    }
                    return objectUrl;
                })();

                imageLoadPromisesRef.current[fileId] = loadPromise;

                try {
                    return await loadPromise;
                } catch (err) {
                    console.error("Failed to load image from Drive", err);
                    throw err;
                } finally {
                    delete imageLoadPromisesRef.current[fileId];
                    setLoadingImages(prev => ({ ...prev, [fileId]: false }));
                }
            };

            const uploadMediaToDrive = async (file) => {
                if (!accessToken || !folderId) {
                    throw new Error('Google Driveが接続されていないため、クラウド保存できません。');
                }

                setSyncLog(`ファイル「${file.name}」をドライブへ直接アップロード中...`);

                const metadata = {
                    name: `diary_media_${Date.now()}_${file.name}`,
                    parents: [folderId],
                    mimeType: file.type
                };

                const boundary = '314159265358979323846';
                const delimiter = `\r\n--${boundary}\r\n`;
                const close_delim = `\r\n--${boundary}--`;

                const metadataPart = 'Content-Type: application/json; charset=UTF-8\r\n\r\n' + JSON.stringify(metadata) + '\r\n';
                
                const chunks = [];
                chunks.push(new TextEncoder().encode(delimiter + metadataPart + delimiter + `Content-Type: ${file.type}\r\n\r\n`));
                chunks.push(file);
                chunks.push(new TextEncoder().encode(close_delim));

                const bodyBlob = new Blob(chunks);

                const result = await new Promise((resolve, reject) => {
                    const xhr = new XMLHttpRequest();
                    xhr.open('POST', 'https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart&fields=id');
                    xhr.setRequestHeader('Authorization', `Bearer ${accessToken}`);
                    xhr.setRequestHeader('Content-Type', `multipart/related; boundary=${boundary}`);

                    xhr.upload.onprogress = (event) => {
                        if (!event.lengthComputable) return;
                        const percent = Math.min(99, Math.round((event.loaded / event.total) * 100));
                        setImageUploadProgress(percent);
                    };

                    xhr.onload = () => {
                        try {
                            const parsed = JSON.parse(xhr.responseText || '{}');
                            if (xhr.status >= 200 && xhr.status < 300) {
                                setImageUploadProgress(100);
                                resolve(parsed);
                            } else {
                                reject(new Error(parsed.error?.message || 'ファイル保存APIでアップロードに失敗しました'));
                            }
                        } catch (err) {
                            reject(err);
                        }
                    };

                    xhr.onerror = () => reject(new Error('ファイルアップロード中に通信エラーが発生しました'));
                    xhr.onabort = () => reject(new Error('ファイルアップロードが中断されました'));
                    xhr.send(bodyBlob);
                });
                 
                if (!result.id) throw new Error('ファイル保存APIでファイルIDが返されませんでした');
                
                const localUrl = URL.createObjectURL(file);
                setImageBlobCache(prev => ({ ...prev, [result.id]: localUrl }));

                setSyncLog('ファイルのアップロード成功！');
                return result.id;
            };

            const addMessage = async (type, content, file = null) => {
                if (!isTodayDate(selectedDate)) {
                    showNotification('投稿できるのは今日の日記だけです。過去の日記は閲覧できます。', 'error');
                    return;
                }

                const dateKey = formatDateKey(selectedDate);
                const now = new Date();
                const timestamp = `${String(now.getHours()).padStart(2, '0')}:${String(now.getMinutes()).padStart(2, '0')}`;
                const createdAt = now.toISOString();
                
                const newMessage = {
                    id: `msg-${Date.now()}-${Math.random().toString(36).substr(2, 9)}`,
                    type,
                    content,
                    timestamp,
                    createdAt,
                    updatedAt: createdAt
                };

                if (isMediaMessage(type) && file) {
                    if (!accessToken) {
                        showNotification('Google Drive接続時のみ、画像・動画ファイルを投稿できます。', 'error');
                        return;
                    }
                    try {
                        setIsImageUploading(true);
                        setImageUploadProgress(0);
                        newMessage.mediaType = file.type || (type === 'video' ? 'video/*' : 'image/*');
                        newMessage.fileName = file.name || '';
                        if (type === 'image') {
                            showNotification('表示用サムネイルを生成中...', 'info');
                            const thumbnailDataUrl = await createImageThumbnail(file);
                            newMessage.thumbnailDataUrl = thumbnailDataUrl;
                        }
                        showNotification(`${type === 'video' ? '動画' : '画像'}ファイルをドライブへ直接アップロード中...`, 'info');
                        const driveFileId = await uploadMediaToDrive(file);
                        newMessage.gdriveFileId = driveFileId;

                    days.push({ date: new Date(year, month, -i), isCurrentMonth: false });

                for (let i = 1; i <= lastDay.getDate(); i++) {

            const MarkdownContent = ({ content }) => {
                const html = React.useMemo(() => {
                    const source = content || '';
                    if (!window.marked || !window.DOMPurify) {
                        return null;
                    }

                    const rawHtml = window.marked.parse(source, {
                        gfm: true,
                        breaks: true,
                    });

                    return window.DOMPurify.sanitize(rawHtml, {
                        ALLOWED_TAGS: [
                            'a', 'blockquote', 'br', 'code', 'del', 'em', 'h1', 'h2', 'h3',
                            'hr', 'li', 'ol', 'p', 'pre', 'strong', 'table', 'tbody', 'td',
                            'th', 'thead', 'tr', 'ul'
                        ],
                        ALLOWED_ATTR: ['href', 'title'],
                        ALLOW_DATA_ATTR: false,
                    });
                }, [content]);

                const highlightedHtml = React.useMemo(() => {
                    const term = getActiveSearchTerm();
                    if (!html || !term) return html;

                    const container = document.createElement('div');
                    container.innerHTML = html;
                    const pattern = new RegExp(`(${escapeRegExp(term)})`, 'gi');
                    const walker = document.createTreeWalker(container, NodeFilter.SHOW_TEXT);
                    const textNodes = [];
                    while (walker.nextNode()) textNodes.push(walker.currentNode);

                    textNodes.forEach(node => {
                        if (!pattern.test(node.nodeValue)) return;
                        pattern.lastIndex = 0;
                        const fragment = document.createDocumentFragment();
                        node.nodeValue.split(pattern).forEach(part => {
                            if (!part) return;
                            if (part.toLowerCase() === term.toLowerCase()) {
                                const mark = document.createElement('mark');
                                mark.className = 'rounded bg-amber-400/25 px-0.5 text-amber-100';
                                mark.textContent = part;
                                fragment.appendChild(mark);
                            } else {
                                fragment.appendChild(document.createTextNode(part));
                            }
                        });
                        node.parentNode.replaceChild(fragment, node);
                    });

                    return container.innerHTML;
                }, [html, searchQuery]);

                if (!html) {
                    return (
                        <p className="text-sm text-slate-200 leading-relaxed whitespace-pre-wrap break-words">
                            <HighlightedText text={content} />
                        </p>
                    );

                return (
                    <div
                        className="markdown-body text-sm text-slate-200 leading-relaxed break-words"
                        dangerouslySetInnerHTML={{ __html: highlightedHtml }}
                    />
                );

            const ImagePreviewModal = ({ src, onClose }) => {
                const [transform, setTransform] = useState({ scale: 1, x: 0, y: 0 });
                const viewportRef = useRef(null);
                const pointersRef = useRef(new Map());
                const gestureRef = useRef(null);
                const movedRef = useRef(false);

                useEffect(() => {
                    setTransform({ scale: 1, x: 0, y: 0 });
                    pointersRef.current.clear();
                    gestureRef.current = null;
                    movedRef.current = false;
                }, [src]);

                const clamp = (value, min, max) => Math.min(max, Math.max(min, value));

                const clampTransform = (next) => {
                    const viewport = viewportRef.current;
                    if (!viewport || next.scale <= 1) return { scale: Math.max(1, next.scale), x: 0, y: 0 };

                    const rect = viewport.getBoundingClientRect();
                    const maxX = (rect.width * (next.scale - 1)) / 2;
                    const maxY = (rect.height * (next.scale - 1)) / 2;
                    return {
                        scale: clamp(next.scale, 1, 5),
                        x: clamp(next.x, -maxX, maxX),
                        y: clamp(next.y, -maxY, maxY)
                    };
                };

                const getPoint = (event) => ({ x: event.clientX, y: event.clientY });
                const getDistance = (a, b) => Math.hypot(a.x - b.x, a.y - b.y);
                const getCenter = (a, b) => ({ x: (a.x + b.x) / 2, y: (a.y + b.y) / 2 });

                const zoomTo = (nextScale) => {
                    setTransform(prev => clampTransform({
                        scale: clamp(nextScale, 1, 5),
                        x: prev.x,
                        y: prev.y
                    }));
                };

                const resetZoom = () => {
                    setTransform({ scale: 1, x: 0, y: 0 });
                };

                const handlePointerDown = (event) => {
                    event.preventDefault();
                    event.currentTarget.setPointerCapture?.(event.pointerId);
                    pointersRef.current.set(event.pointerId, getPoint(event));
                    movedRef.current = false;

                    const points = Array.from(pointersRef.current.values());
                    if (points.length === 1) {
                        gestureRef.current = {
                            type: 'pan',
                            start: points[0],
                            startTransform: transform
                        };
                    } else if (points.length >= 2) {
                        const [a, b] = points;
                        const center = getCenter(a, b);
                        const rect = viewportRef.current.getBoundingClientRect();
                        const viewportCenter = { x: rect.left + rect.width / 2, y: rect.top + rect.height / 2 };
                        gestureRef.current = {
                            type: 'pinch',
                            startDistance: getDistance(a, b),
                            startCenter: center,
                            startScale: transform.scale,
                            startTransform: transform,
                            contentPoint: {
                                x: (center.x - viewportCenter.x - transform.x) / transform.scale,
                                y: (center.y - viewportCenter.y - transform.y) / transform.scale
                            },
                            viewportCenter
                        };
                    }
                };

                const handlePointerMove = (event) => {
                    if (!pointersRef.current.has(event.pointerId)) return;
                    event.preventDefault();
                    pointersRef.current.set(event.pointerId, getPoint(event));

                    const points = Array.from(pointersRef.current.values());
                    const gesture = gestureRef.current;
                    if (!gesture) return;

                    if (gesture.type === 'pinch' && points.length >= 2) {
                        const [a, b] = points;
                        const center = getCenter(a, b);
                        const nextScale = clamp(gesture.startScale * (getDistance(a, b) / gesture.startDistance), 1, 5);
                        movedRef.current = true;
                        setTransform(clampTransform({
                            scale: nextScale,
                            x: center.x - gesture.viewportCenter.x - gesture.contentPoint.x * nextScale,
                            y: center.y - gesture.viewportCenter.y - gesture.contentPoint.y * nextScale
                        }));
                    } else if (gesture.type === 'pan' && points.length === 1 && transform.scale > 1) {
                        const current = points[0];
                        const dx = current.x - gesture.start.x;
                        const dy = current.y - gesture.start.y;
                        if (Math.abs(dx) > 2 || Math.abs(dy) > 2) movedRef.current = true;
                        setTransform(clampTransform({
                            scale: gesture.startTransform.scale,
                            x: gesture.startTransform.x + dx,
                            y: gesture.startTransform.y + dy
                        }));
                    }
                };

                const handlePointerEnd = (event) => {
                    pointersRef.current.delete(event.pointerId);
                    const points = Array.from(pointersRef.current.values());
                    if (points.length === 1) {
                        gestureRef.current = {
                            type: 'pan',
                            start: points[0],
                            startTransform: transform
                        };
                    } else {
                        gestureRef.current = null;
                    }
                };

                const handleBackdropClick = (event) => {
                    if (event.target === event.currentTarget && !movedRef.current) onClose();
                };

                const handleDoubleClick = (event) => {
                    event.stopPropagation();
                    if (transform.scale > 1) {
                        resetZoom();
                    } else {
                        zoomTo(2.2);
                    }
                };

                return (
                    <div
                        className="fixed inset-0 z-50 bg-black/95 flex flex-col"
                        onClick={handleBackdropClick}
                    >
                        <div className="absolute top-4 right-4 z-10 flex items-center gap-2">
                            <button
                                type="button"
                                onClick={(event) => { event.stopPropagation(); zoomTo(transform.scale - 0.5); }}
                                className="text-white hover:text-slate-300 p-2 bg-slate-900/80 rounded-full border border-slate-700"
                                title="縮小"
                            >
                                <i data-lucide="minus" className="w-5 h-5"></i>
                            </button>
                            <button
                                type="button"
                                onClick={(event) => { event.stopPropagation(); resetZoom(); }}
                                className="text-white hover:text-slate-300 px-3 py-2 bg-slate-900/80 rounded-full border border-slate-700 text-xs font-semibold"
                                title="表示をリセット"
                            >
                                {Math.round(transform.scale * 100)}%
                            </button>
                            <button
                                type="button"
                                onClick={(event) => { event.stopPropagation(); zoomTo(transform.scale + 0.5); }}
                                className="text-white hover:text-slate-300 p-2 bg-slate-900/80 rounded-full border border-slate-700"

                                                        {msg.type === 'image' ? (
                                                            <div className="w-8 h-8 md:w-9 md:h-9 rounded-xl bg-violet-950/50 border border-violet-800 text-violet-400 flex items-center justify-center">
                                                                <i data-lucide="image" className="w-4 h-4"></i>
                                                            </div>
                                                        ) : msg.type === 'video' ? (
                                                            <div className="w-8 h-8 md:w-9 md:h-9 rounded-xl bg-cyan-950/50 border border-cyan-800 text-cyan-300 flex items-center justify-center">
                                                                <i data-lucide="video" className="w-4 h-4"></i>
                                                            </div>
                                                        ) : (
                                                            <div className="w-8 h-8 md:w-9 md:h-9 rounded-xl bg-indigo-950/50 border border-indigo-800 text-indigo-400 flex items-center justify-center">
                                                                <i data-lucide="calendar-days" className="w-4 h-4"></i>
                                                            </div>
                                                        )}
                                                    </div>

                                                    <div className="flex-1 space-y-1 overflow-hidden">
                                                        <div className="flex items-center justify-between">
                                                            <span className="text-[9px] md:text-[10px] font-bold tracking-wider text-slate-500">
                                                                {msg.type === 'image' ? 'IMAGE LOG' : msg.type === 'video' ? 'VIDEO LOG' : 'TEXT LOG'}
                                                            </span>
                                                            <span className="text-[9px] md:text-[10px] text-slate-600">{msg.timestamp}</span>
                                                        </div>
                                                        
                                                        {msg.type === 'image' && msg.gdriveFileId && (
                                                            <div className="my-1.5">
                                                                <DriveImage fileId={msg.gdriveFileId} thumbnailDataUrl={msg.thumbnailDataUrl} />
                                                            </div>
                                                        )}

                                                        {msg.type === 'video' && msg.gdriveFileId && (
                                                            <div className="my-1.5">
                                                                <DriveVideo fileId={msg.gdriveFileId} />
                                                            </div>
                                                        )}

                                                        {editingMessage?.id === msg.id && editingMessage?.dateKey === dateKey ? (
                                                            <div className="space-y-2">
                                                                <textarea
                                                                    value={editingText}
                                                                    onChange={(e) => setEditingText(e.target.value)}
                                                                    rows="4"
                                                                    className="w-full rounded-xl border border-indigo-900/70 bg-slate-950 px-3 py-2 text-[16px] md:text-sm text-slate-200 placeholder-slate-500 focus:outline-none focus:border-indigo-500 resize-y"
                                                                    placeholder={isMediaMessage(msg.type) ? `${msg.type === 'video' ? '動画' : '画像'}キャプションを入力...` : '本文を入力...'}
                                                                />
                                                                <div className="flex items-center justify-end gap-2">
                                                                    <button
                                                                        type="button"
                                                                        onClick={cancelEditingMessage}
                                                                        className="px-3 py-1.5 rounded-lg border border-slate-800 text-xs text-slate-400 hover:bg-slate-800 hover:text-white transition-colors"
                                                                    >
                                                                        キャンセル
                                                                    </button>
                                                                    <button
                                                                        type="button"
                                                                        onClick={saveEditedMessage}
                                                                        className="px-3 py-1.5 rounded-lg bg-indigo-600 text-xs font-semibold text-white hover:bg-indigo-700 transition-colors"
                                                                    >
                                                                        保存
                                                                    </button>
                                                                </div>
                                                            </div>
                                                        ) : (
                                                            <>
                                                                <MarkdownContent content={msg.content} />
                                                                <UrlCards content={msg.content} />
                                                            </>
                                                        )}
                                                    </div>

                                                    <div className="opacity-100 md:opacity-0 group-hover:opacity-100 flex flex-col gap-1 transition-all self-center md:self-start">
                                                        <button
                                                            type="button"
                                                            onClick={() => handleCopyMessage(msg)}
                                                            className="p-1.5 text-slate-600 hover:text-emerald-400 hover:bg-emerald-950/30 rounded-lg transition-all"
                                                            title="本文をコピー"
                                                        >
                                                            <i data-lucide="copy" className="w-3.5 h-3.5"></i>
                                                        </button>
                                                        <button
                                                            type="button"
                                                            onClick={() => startEditingMessage(dateKey, msg)}
                                                            className="p-1.5 text-slate-600 hover:text-indigo-400 hover:bg-indigo-950/30 rounded-lg transition-all"
                                                            title="編集"
                                                        >
                                                            <i data-lucide="pencil" className="w-3.5 h-3.5"></i>
                                                        </button>
                                                        <button 
                                                            type="button"
                                                            onClick={() => handleDeleteMessage(dateKey, msg.id, msg.gdriveFileId)}
                                                            className="p-1.5 text-slate-600 hover:text-red-400 hover:bg-red-950/30 rounded-lg transition-all"
                                                            title="削除"
                                                        >
                                                            <i data-lucide="trash-2" className="w-3.5 h-3.5"></i>
                                                        </button>
                                                    </div>
                                                </div>
                                            ))}
                                            <div ref={messagesEndRef} />
                                        </div>
                                    )}
                                </div>

                                <div className="p-3 md:p-4 border-t border-slate-800 bg-slate-900/40 shrink-0 pb-safe">
                                    <div className="max-w-3xl mx-auto">
                                        {!canPostToSelectedDate && (
                                            <div className="mb-2 rounded-xl border border-slate-800 bg-slate-950 px-3 py-2 text-[11px] text-slate-400 flex items-center gap-2">
                                                <i data-lucide="lock" className="w-3.5 h-3.5 text-slate-500 shrink-0"></i>
                                                <span>今日以外の日記には新規投稿できません。内容の確認と削除はできます。</span>
                                            </div>
                                        )}
                                        <form onSubmit={handleSendText} className={`relative bg-slate-900 border border-slate-800 rounded-2xl p-1.5 focus-within:border-indigo-500 ${!canPostToSelectedDate ? 'opacity-70' : ''}`}>
                                            {pendingImage && pendingImageUrl && (
                                                <div className="m-1 mb-2 rounded-xl border border-slate-800 bg-slate-950 p-2 flex items-center gap-3">
                                                    {isVideoFile(pendingImage) ? (
                                                        <div className="w-20 h-16 rounded-lg overflow-hidden bg-black border border-slate-800 shrink-0">
                                                            <video src={pendingImageUrl} muted playsInline preload="metadata" className="w-full h-full object-cover" />
                                                        </div>
                                                    ) : (
                                                        <button
                                                            type="button"
                                                            onClick={() => setPreviewImage(pendingImageUrl)}
                                                            className="w-16 h-16 rounded-lg overflow-hidden bg-slate-900 border border-slate-800 shrink-0"
                                                            title="画像を拡大"
                                                        >
                                                            <img src={pendingImageUrl} alt="Selected upload preview" className="w-full h-full object-cover" />
                                                        </button>
                                                    )}
                                                    <div className="min-w-0 flex-1">
                                                        <p className="text-xs font-semibold text-slate-200 truncate">{pendingImage.name || (isVideoFile(pendingImage) ? 'アップロード動画' : 'アップロード画像')}</p>
                                                        <p className="text-[10px] text-slate-500">{Math.max(1, Math.round(pendingImage.size / 1024))} KB</p>
                                                        <p className="text-[10px] text-indigo-400 mt-1">
                                                            {isImageUploading ? `Google Driveへアップロード中... ${imageUploadProgress}%` : isUrlSummarizing ? 'URLのAI要約を生成中...' : 'キャプションを書いて送信できます'}
                                                        </p>
                                                        {isImageUploading && (
                                                            <div className="mt-2 h-1.5 w-full bg-slate-800 rounded-full overflow-hidden">
                                                                <div
                                                                    className="h-full bg-indigo-500 transition-all duration-200"
                                                                    style={{ width: `${imageUploadProgress}%` }}
                                                                />
                                                            </div>
                                                        )}
                                                    </div>
                                                    <button
                                                        type="button"
                                                        onClick={clearPendingImage}
                                                        disabled={isImageUploading}
                                                        className="p-1.5 text-slate-500 hover:text-red-400 hover:bg-red-950/30 rounded-lg disabled:opacity-30"
                                                        title="ファイルを取り消す"
                                                    >
                                                        <i data-lucide="x" className="w-4 h-4"></i>
                                                    </button>
                                                </div>
                                            )}
                                            <textarea
                                                value={inputText}
                                                onChange={(e) => setInputText(e.target.value)}
                                                onPaste={handlePaste}
                                                onKeyDown={(e) => {
                                                    if (e.key === 'Enter' && !e.shiftKey && window.innerWidth >= 768) {
                                                        e.preventDefault();
                                                        handleSendText(e);
                                                    }
                                                }}
                                                placeholder={!canPostToSelectedDate ? "今日以外の日記には新規投稿できません。" : pendingImage ? `${isVideoFile(pendingImage) ? '動画' : '画像'}のキャプションを入力...` : accessToken ? "ここにメッセージを入力..." : "設定からGoogle Driveにログインすると、高画質な日記同期が利用できます。"}
                                                disabled={!accessToken || !canPostToSelectedDate || isImageUploading || isUrlSummarizing}
                                                rows="2"
                                                className="w-full bg-transparent text-[16px] md:text-sm text-slate-200 placeholder-slate-500 px-3 py-1.5 focus:outline-none resize-none disabled:opacity-50"
                                            />

                                            <div className="flex justify-between items-center px-2 pt-1.5 border-t border-slate-800/40 mt-1">
                                                <input 
                                                    type="file" 
                                                    ref={fileInputRef}
                                                    onChange={handleFileChange}
                                                    accept="image/*,video/*"
                                                    className="hidden"
                                                />
                                                <button
                                                    type="button"
                                                    onClick={() => fileInputRef.current?.click()}
                                                    disabled={!accessToken || !canPostToSelectedDate || isImageUploading || isUrlSummarizing}
                                                    className="flex items-center gap-1 text-xs text-slate-400 hover:text-indigo-400 px-2.5 py-1.5 rounded-lg hover:bg-slate-800 disabled:opacity-30"
                                                >
                                                    <i data-lucide="paperclip" className="w-4 h-4"></i>
                                                    <span className="hidden sm:inline">画像・動画を追加</span>
                                                    <span className="sm:hidden">ファイル追加</span>
                                                </button>

                                                <div className="flex items-center gap-2">
                                                    <span className="text-[10px] text-slate-500 hidden md:inline">{pendingImage ? 'Enterでファイル送信' : 'Enterで送信'}</span>
                                                    <button
                                                        type="submit"
                                                        disabled={(!inputText.trim() && !pendingImage) || !accessToken || !canPostToSelectedDate || isImageUploading || isUrlSummarizing}
                                                        className="bg-indigo-600 hover:bg-indigo-700 disabled:opacity-40 text-white font-semibold p-2 rounded-xl text-xs transition-colors flex items-center justify-center"
                                                    >
                                                        <i data-lucide={(isImageUploading || isUrlSummarizing) ? "loader" : "send"} className={`w-4 h-4 ${(isImageUploading || isUrlSummarizing) ? 'animate-spin' : ''}`}></i>
                                                    </button>
                                                </div>
                                            </div>
                                        </form>
                                    </div>
                                </div>
                            </>
                        )}
                    </div>

                    {/* 拡大プレビュー */}
                    {(previewImage || isPreviewImageLoading) && (
                        <ImagePreviewModal src={previewImage} onClose={closePreviewImage} />
                    )}

                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
